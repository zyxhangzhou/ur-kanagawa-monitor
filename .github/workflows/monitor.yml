name: UR Kanagawa Monitor

on:
  # Triggered by cron-job.org at 08:00 / 14:00 / 20:00 JST (see README)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config user.name "ur-monitor-bot"
          git config user.email "ur-monitor-bot@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: update vacancy state [skip ci]"
            git push
          fi
